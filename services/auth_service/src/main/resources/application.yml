# Server Configuration
server:
  port: 8081

# Spring Application Configuration
spring:
  application:
    name: auth_service

  # Database Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/auth_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: isuri
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    show-sql: true

  # Redis Configuration (for token blacklist)
  data:
    redis:
      host: localhost
      port: 6379

# Eureka Client Configuration (Service Discovery)
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

# JWT Configuration
app:
  jwt:
    # Secret key for signing JWT (must be at least 256 bits for HS512)
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    expiration: 86400000      # 24 hours in milliseconds
    refresh-expiration: 604800000  # 7 days in milliseconds

# Logging Configuration
logging:
  level:
    com.healthcare.auth: DEBUG
    org.springframework.security: DEBUG

# Actuator Endpoints (for health checks)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always