server:
  port: 8086

spring:
  application:
    name: ai-symptom-checker

eureka:
  client:
    service-url:
      defaultZone: http://service-discovery:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

services:
  appointment-service:
    # Optional override. If set, Feign will call this directly instead of using Eureka.
    url: ${APPOINTMENT_SERVICE_URL:}

ai:
  gemini:
    api-key: ${GEMINI_API_KEY:AIzaSyCudFjsyvesRqy7Hfj5BN17cRHk3_MX_oI}
    model: ${GEMINI_MODEL:gemini-1.5-flash}

logging:
  level:
    com.healthcare.ai_symptom_checker: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info