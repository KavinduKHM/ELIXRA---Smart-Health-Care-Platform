server:
  port: 8083

spring:
  application:
    name: doctor-service

  # Database Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/doctor_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: isuri
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    show-sql: true

  # RabbitMQ Configuration (for async notifications)
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

# Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

# Logging
logging:
  level:
    com.healthcare.doctor: DEBUG

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics