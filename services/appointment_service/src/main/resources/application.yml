server:
  port: 8084

spring:
  application:
    name: appointment-service

  # ========== DATABASE CONFIGURATION ==========
  datasource:
    # Using port 3307 (your Docker container port)
    url: jdbc:mysql://localhost:3307/appointment_service_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    show-sql: true

# Eureka (disable for now if not running)
eureka:
  client:
    enabled: false

logging:
  level:
    com.healthcare.appointment_service: DEBUG
    org.hibernate.SQL: DEBUG