server:
  port: 8084

spring:
  application:
    name: appointment_service

# Eureka client configuration (Docker-compose network uses service-discovery hostname)
eureka:
  client:
    service-url:
      defaultZone: http://service-discovery:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.healthcare.appointment_service: DEBUG

