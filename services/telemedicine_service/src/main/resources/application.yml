# Server Configuration
server:
  port: 8085

# Spring Application Configuration
spring:
  application:
    name: telemedicine-service
  
  # Database Configuration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/telemedicine_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update  # Auto-create tables
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    show-sql: true
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}

# Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

# Agora Configuration (Replace with your actual credentials from agora.io)
agora:
  app-id: 0285c138d0d34d71ba6b7a6a0440cc1b          # Get from Agora Console
  app-certificate: a26ef39826a24a3599b281f64b60207f  # Get from Agora Console
  token-expiration: 7200              # Token validity in seconds (1 hour)

# Logging
logging:
  level:
    com.healthcare.telemedicine: DEBUG

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
