services:
  mysql-payment:
    image: mysql:8.0
    container_name: mysql-payment
    environment:
      MYSQL_ROOT_PASSWORD: Shaini8
      MYSQL_DATABASE: payment_db
    ports:
      - "3307:3306"
    volumes:
      - mysql-payment-data:/var/lib/mysql
    networks:
      - payment-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pShaini8"]
      interval: 10s
      timeout: 5s
      retries: 5

  payment-service:
    build: .
    container_name: payment-service
    ports:
      - "8086:8086"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-payment:3306/payment_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Shaini8
      EUREKA_CLIENT_ENABLED: "false"
    depends_on:
      mysql-payment:
        condition: service_healthy
    networks:
      - payment-network
    restart: unless-stopped

networks:
  payment-network:
    driver: bridge

volumes:
  mysql-payment-data: