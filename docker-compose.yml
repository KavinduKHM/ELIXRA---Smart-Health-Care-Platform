  # Service Discovery (Eureka)
  service-discovery:
    build:
      context: ./infrastructure/service-discovery
      dockerfile: Dockerfile
    container_name: service-discovery
    ports:
      - "8761:8761"
    networks:
      - healthcare-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Telemedicine Service
  telemedicine-service:
    build:
      context: ./services/telemedicine_service
      dockerfile: Dockerfile
    container_name: telemedicine-service
    ports:
      - "8085:8085"
    depends_on:
#      mysql-telemedicine:
#        condition: service_healthy
      service-discovery:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      # Add allowPublicKeyRetrieval=true and useSSL=false
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/telemedicine_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-discovery:8761/eureka/
      AGORA_APP_ID: ${AGORA_APP_ID:-0285c138d0d34d71ba6b7a6a0440cc1b}
      AGORA_APP_CERTIFICATE: ${AGORA_APP_CERTIFICATE:-a26ef39826a24a3599b281f64b60207f}
      AGORA_TOKEN_EXPIRATION: 3600
    networks:
      - healthcare-network

networks:
  healthcare-network:
    driver: bridge

volumes:
  mysql-telemedicine-data: