apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-telemedicine
  namespace: healthcare
  labels:
    app: mysql-telemedicine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-telemedicine
  template:
    metadata:
      labels:
        app: mysql-telemedicine
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        ports:
        - containerPort: 3306
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            configMapKeyRef:
              name: db-config
              key: MYSQL_ROOT_PASSWORD
        - name: MYSQL_DATABASE
          valueFrom:
            configMapKeyRef:
              name: db-config
              key: MYSQL_DATABASE
        - name: MYSQL_ROOT_HOST
          value: "%"
        args:
        - "--default-authentication-plugin=mysql_native_password"
        volumeMounts:
        - name: mysql-storage
          mountPath: /var/lib/mysql
      volumes:
      - name: mysql-storage
        persistentVolumeClaim:
          claimName: mysql-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: healthcare
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
