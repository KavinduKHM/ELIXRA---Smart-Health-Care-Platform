services:
  service-discovery:
    build:
      context: ../infrastructure/service-discovery
    container_name: service-discovery
    ports:
      - "8761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - healthcare-network
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:8761/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 10

  mysql-telemedicine:
    image: mysql:8.0
    container_name: mysql-telemedicine
    ports:
      - "3308:3306"
    environment:
      MYSQL_DATABASE: telemedicine_db
      MYSQL_ROOT_PASSWORD: root
    command: ["--default-authentication-plugin=mysql_native_password"]
    volumes:
      - mysql_telemedicine_data:/var/lib/mysql
    networks:
      - healthcare-network

  mysql-doctor:
    image: mysql:8.0
    container_name: mysql-doctor
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: doctor_db
      MYSQL_ROOT_PASSWORD: root
    command: ["--default-authentication-plugin=mysql_native_password"]
    volumes:
      - mysql_doctor_data:/var/lib/mysql
    networks:
      - healthcare-network

  mysql-appointment:
    image: mysql:8.0
    container_name: mysql-appointment
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: appointment_db
    ports:
      - "3309:3306"
    volumes:
      - mysql-appointment-data:/var/lib/mysql
    networks:
      - healthcare-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-patient:
    image: mysql:8.0
    container_name: mysql-patient
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: patient_db
    ports:
      - "3310:3306"
    volumes:
      - mysql-patient-data:/var/lib/mysql
    networks:
      - healthcare-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-payment:
    image: mysql:8.0
    container_name: mysql-payment
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: payment_db
    ports:
      - "3311:3306"
    volumes:
      - mysql-payment-data:/var/lib/mysql
    networks:
      - healthcare-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-notification:
    image: mysql:8.0
    container_name: mysql-notification
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: notification_db
    ports:
      - "3312:3306"
    volumes:
      - mysql-notification-data:/var/lib/mysql
    networks:
      - healthcare-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot" ]
      interval: 10s
      timeout: 5s
      retries: 5

  telemedicine-service:
    build:
      context: ../services/telemedicine_service
    container_name: telemedicine-service
    depends_on:
      - service-discovery
      - mysql-telemedicine
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-discovery:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-telemedicine:3306/telemedicine_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      AGORA_APP_ID: ${AGORA_APP_ID}
      AGORA_APP_CERTIFICATE: ${AGORA_APP_CERTIFICATE}
      AGORA_TOKEN_EXPIRATION: ${AGORA_TOKEN_EXPIRATION:-7200}
    networks:
      - healthcare-network

  doctor-service:
    build:
      context: ../services/doctor_service
    container_name: doctor-service
    depends_on:
      - service-discovery
      - mysql-doctor
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-discovery:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-doctor:3306/doctor_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    networks:
      - healthcare-network

  appointment-service:
    build:
      context: ../services/appointment_service
      dockerfile: Dockerfile
    container_name: appointment-service
    ports:
      - "8084:8084"
    depends_on:
      service-discovery:
        condition: service_healthy
      mysql-appointment:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-appointment:3306/appointment_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-discovery:8761/eureka/
    networks:
      - healthcare-network

  patient-service:
    build:
      context: ../services/patient_service
      dockerfile: Dockerfile
    container_name: patient-service
    ports:
      - "8082:8082"
    depends_on:
      service-discovery:
        condition: service_healthy
      mysql-patient:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-patient:3306/patient_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-discovery:8761/eureka/
      # Cloudinary credentials (replace with actual or use dummy for now)
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    networks:
      - healthcare-network

  ai-symptom-checker:
    build:
      context: ../services/ai_symptom_checker
      dockerfile: Dockerfile
    container_name: ai-symptom-checker
    ports:
      - "8086:8086"
    depends_on:
      service-discovery:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-discovery:8761/eureka/
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      # Direct-call fallback when Eureka doesn't have appointment-service instances
      APPOINTMENT_SERVICE_URL: http://appointment-service:8084
    networks:
      - healthcare-network

  payment-service:
    build:
      context: ../services/payment_service
      dockerfile: Dockerfile
    container_name: payment-service
    ports:
      - "8087:8087"
    depends_on:
      service-discovery:
        condition: service_healthy
      mysql-payment:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-discovery:8761/eureka/
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
    networks:
      - healthcare-network

  notification-service:
    build:
      context: ../services/notification_service
    container_name: notification-service
    ports:
      - "3002:3002"
    depends_on:
      service-discovery:
        condition: service_healthy
      mysql-notification:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-discovery:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-notification:3306/notification_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-oshadha72mihiran@gmail.com}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_WHATSAPP_NUMBER: ${TWILIO_WHATSAPP_NUMBER:-whatsapp:+14155238886}
    networks:
      - healthcare-network

volumes:
  mysql_telemedicine_data:
  mysql_doctor_data:
  mysql-appointment-data:
  mysql-patient-data:
  mysql-symptom-checker-data:
  mysql-payment-data:
  mysql-notification-data:

networks:
  healthcare-network:
    name: healthcare-network
